<style>
.scene {
  width: 100px;
  height: 100px;
  perspective: 1000px; /* Gives the dice 3D depth */
  margin: 50px;
}

.box {
  width: 100px;
  height: 100px;
  background-color: #3498db;
  position: relative;
  
  /* 'ease-out' makes it look like it's slowing down naturally at the end */
  transition: transform 2s ease-out, margin-left 2s ease-out, background-color 1s;
  transform-style: preserve-3d;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.box:hover {
  /* The "Dice Roll": rotates heavily on X, Y, and Z axes */
  transform: rotateX(720deg) rotateY(1080deg) rotateZ(360deg);
  
  /* Travels across the page */
  margin-left: calc(100% - 150px);
  
  /* Visual feedback: changes color and lifts the shadow */
  background-color: #f1c40f; 
  box-shadow: 0 40px 60px rgba(0,0,0,0.3);
}.box {
  width: 100px;
  height: 100px;
  background-color: #3498db;
  margin: 20px;
/* transition: transform 0.8s ease-in-out, background-color 0.5s;*/
transition: transform 2s, margin-left 2s, background-color 2s;
}
.box:hover {
  transform: rotate(360deg); 
  background-color: #e74c3c;
}
